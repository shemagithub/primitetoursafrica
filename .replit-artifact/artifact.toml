kind = "web"
previewPath = "/"
title = "Primates Quest Safaris"
version = "1.0.0"
id = "artifacts/primates-quest"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24945

[services.development]
run = "pnpm --filter @workspace/primates-quest run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/primates-quest", "run", "build" ]
serve = "static"
publicDir = "artifacts/primates-quest/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24945"
BASE_PATH = "/"
